version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cherifi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cherifi
      POSTGRES_PASSWORD: cherifi_dev_password
      POSTGRES_DB: cherifi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
